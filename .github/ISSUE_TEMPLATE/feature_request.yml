name: Feature request
description: Suggest an improvement for the ROS 2 driver
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should the driver do?
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: Describe the robot/application and why this matters.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
